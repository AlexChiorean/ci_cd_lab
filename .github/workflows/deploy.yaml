name: Build CI/CD

on:
  push:
    branches:
      - main

jobs:
  # TODO 01 - Job pentru teste automate
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

  # Job-ul de compile modificat
  compile:
    runs-on: ubuntu-latest
    # TODO 02 - Asigurăm ordinea: testul trebuie să fie OK înainte de compile
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: go mod download

      - name: Compile binary
        run: go build -o myapp
